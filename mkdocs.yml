site_name: "Agentic AI Design Patterns Workshop"
site_description: "A hands-on workshop teaching agentic AI design patterns using pure Python and the OpenAI SDK"
site_url: ""

theme:
  name: material
  icon:
    logo: fontawesome/brands/microsoft
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

copyright: >
  This is not an official Microsoft product and does not constitute official Microsoft documentation, training materials, intellectual property, or product guidance.

extra_css:
  - css/message-flow.css

extra_javascript:
  - js/message-flow.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup:
      - Getting Started: setup.md
      - Workshop TUI: workshop-tui.md
      - "✏️ Exercise":
          - Connection Test: exercises/00_setup.md
  - "1 - LLM Foundations":
      - Chat Completions API: concepts/chat-completions-api.md
      - System Prompts: concepts/system-prompts.md
      - Structured Outputs: concepts/structured-outputs.md
      - What Is an Agent?: concepts/what-is-an-agent.md
      - Responses API: concepts/responses-api.md
      - "✏️ Exercises":
          - Chat Completion: exercises/01_chat_completion.md
          - System Prompts: exercises/01_system_prompts.md
          - Structured Outputs: exercises/01_structured_outputs.md
  - "2 - Tools & Function Calling":
      - Function Calling: concepts/function-calling.md
      - Payload Walkthrough: concepts/payload-walkthrough.md
      - The Agent Run Loop: concepts/agent-run-loop.md
      - "✏️ Exercises":
          - Function Calling: exercises/02_function_calling.md
          - Tool Loop: exercises/02_tool_loop.md
  - "3 - Agent Patterns":
      - Orchestration Overview: concepts/orchestration-overview.md
      - Single Agent: patterns/single-agent.md
      - Sequential: patterns/sequential.md
      - Concurrent: patterns/concurrent.md
      - Brainstorm (Round-Robin): patterns/brainstorm.md
      - Maker-Checker (Reflection): patterns/maker-checker.md
      - Handoff: patterns/handoff.md
      - Magentic: patterns/magentic.md
      - "✏️ Exercises":
          - Single Agent: exercises/03_single_agent.md
          - Sequential: exercises/04_sequential.md
          - Concurrent: exercises/05_concurrent.md
          - Brainstorm: exercises/06_brainstorm.md
          - Maker-Checker: exercises/06_maker_checker.md
          - Handoff: exercises/07_handoff.md
          - Magentic: exercises/08_magentic.md
  - Production Considerations:
      - Overview: production-considerations/index.md
      - Context Management: production-considerations/context-management.md
      - Reliability: production-considerations/reliability.md
      - Human in the Loop: production-considerations/human-in-the-loop.md
      - Choosing a Pattern: production-considerations/choosing-a-pattern.md
  - Slides:
      - All Slides: slides/index.md
  - References:
      - References: references.md
  - All Exercises:
      - Overview: all-exercises.md
